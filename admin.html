<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin – HR Cabs Chennai</title>
<style>
:root{--gold:#C7A007;--green:#0A5C36;--green2:#0d7a49;--dark:#0a0f0d;--dark2:#0f1a14;--card:#111a15;--border:#1e3028;--text:#e8f0eb;--muted:#6a8e7a;--red:#e05555;--radius:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--dark);color:var(--text);min-height:100vh}

/* LOGIN */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;text-align:center}
.login-logo{height:60px;margin-bottom:24px}
.login-title{font-size:1.6rem;font-weight:800;color:var(--gold);margin-bottom:8px}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px 28px;width:100%;max-width:380px}
.login-note{font-size:12px;color:var(--muted);margin-top:16px}
.access-denied{color:var(--red);font-size:13px;margin-top:12px;display:none}

/* DASHBOARD */
.dashboard{display:none}
nav{background:var(--dark2);border-bottom:1px solid var(--border);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between}
.nav-logo img{height:34px}
.nav-user{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.nav-user img{width:30px;height:30px;border-radius:50%}
.logout-btn{padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit}

.main{max-width:1200px;margin:0 auto;padding:24px 16px}
.page-title{font-size:1.4rem;font-weight:800;color:var(--gold);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:24px}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.stat-value{font-size:1.8rem;font-weight:900;color:var(--gold)}
.stat-sub{font-size:11px;color:var(--muted);margin-top:2px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;transition:all .2s}
.tab.active{background:var(--gold);color:#0a0f0d}

/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.table-header{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.table-title{font-size:14px;font-weight:700}
.search-box{background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;outline:none;width:200px}
.search-box::placeholder{color:var(--muted)}
table{width:100%;border-collapse:collapse}
th{padding:11px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);background:var(--dark2)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-city{background:rgba(10,92,54,0.2);color:#5de8a0}
.badge-out{background:rgba(199,160,7,0.15);color:var(--gold)}
.badge-booking{background:rgba(99,102,241,0.15);color:#a5b4fc}
.total-cell{font-weight:700;color:var(--gold)}
.loading{text-align:center;padding:40px;color:var(--muted);font-size:14px}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:14px}

/* FILTER BAR */
.filter-bar{
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px 16px;margin-bottom:16px;
}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.filter-input{
  background:var(--dark2);border:1px solid var(--border);
  border-radius:8px;padding:7px 10px;color:var(--text);
  font-size:13px;outline:none;color-scheme:dark;
}
.filter-input:focus{border-color:var(--gold)}
.filter-quick{display:flex;gap:6px;flex-wrap:wrap}
.qbtn{
  padding:6px 12px;background:transparent;
  border:1px solid var(--border);border-radius:6px;
  color:var(--muted);font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:all .2s;
}
.qbtn:hover,.qbtn.active{background:rgba(199,160,7,0.1);border-color:var(--gold);color:var(--gold)}
.export-btn{
  margin-left:auto;padding:7px 16px;
  background:var(--green);color:#fff;
  border:none;border-radius:8px;font-size:12px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:background .2s;white-space:nowrap;
}
.export-btn:hover{background:var(--green2)}

/* DOWNLOAD BUTTON */
.dl-btn{
  display:inline-block;padding:4px 10px;
  background:rgba(10,92,54,0.15);color:#5de8a0;
  border:1px solid rgba(10,92,54,0.3);border-radius:6px;
  font-size:11px;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .2s;font-family:inherit;
}
.dl-btn:hover{background:rgba(10,92,54,0.3);color:#fff}

/* REVENUE CHART */
.chart-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
.chart-title{font-size:14px;font-weight:700;margin-bottom:16px}
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:140px;padding:8px 4px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:4px}
.bar{width:100%;min-height:4px;background:linear-gradient(180deg,var(--gold),var(--green));border-radius:4px 4px 0 0;min-height:4px;transition:height .4s}
.bar-label{font-size:9px;color:var(--muted);text-align:center}
.bar-val{font-size:9px;color:var(--gold);font-weight:700}

@media(max-width:768px){
  th:nth-child(3),th:nth-child(4),td:nth-child(3),td:nth-child(4){display:none}
  .search-box{width:140px}
  .table-header{flex-direction:column;gap:10px;align-items:flex-start}
}
</style>
</head>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxNKPSLH7VHvHr39PDePDoLMcAySy2_P9THYvasxykCPi2xIxL5t857cz7iG34iqZuB-A/exec';
const ALLOWED_EMAIL = 'hrcabschennai@gmail.com';
let allData = {};
let currentTab = 'trips';

// ── LOGIN ──────────────────────────────────────────
const ADMIN_PASSWORD = 'hrcabs2026';

function doLogin() {
  const pass = document.getElementById('adminPass').value.trim();
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('adminPass').value = '';
    document.getElementById('adminPass').focus();
  }
}

function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('adminPass').value = '';
}

// ── RENDER STATS ──────────────────────────────────
function renderStats(d){
  function set(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
  set('todayRev',   'Rs.'+(d.todayRevenue||0).toFixed(0));
  set('todayTrips', (d.todayTrips||0)+' trips');
  set('weekRev',    'Rs.'+(d.weekRevenue||0).toFixed(0));
  set('weekTrips',  (d.weekTrips||0)+' trips');
  set('monthRev',   'Rs.'+(d.monthRevenue||0).toFixed(0));
  set('monthTrips', (d.monthTrips||0)+' trips');
  set('newBookings',(d.pendingBookings||0)+' pending');
  set('pendingBook',(d.pendingBookings||0)+' pending');
}

// ── RENDER CHART ──────────────────────────────────
function renderChart(last7){
  const wrap = document.getElementById('chartBars');
  if(!wrap) return;
  if(!last7||!last7.length){wrap.innerHTML='<div style="color:var(--muted);font-size:13px;padding:20px">No data yet.</div>';return;}
  const max = Math.max(...last7.map(d=>d.revenue), 1);
  wrap.innerHTML = last7.map(d=>{
    const h = Math.max(4, Math.round((d.revenue/max)*100));
    return '<div class="bar-col">'
      + '<div class="bar-val">' + (d.revenue>0?'Rs.'+Math.round(d.revenue):'') + '</div>'
      + '<div class="bar" style="height:'+h+'px"></div>'
      + '<div class="bar-label">'+d.label+'</div>'
      + '</div>';
  }).join('');
}

// ── RENDER TRIPS ──────────────────────────────────
function renderTrips(trips){

  body.innerHTML = '<table style="width:100%;border-collapse:collapse">'
    + '<thead><tr>'
    + '<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Trip No</th>'

    + '<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Date</th>'

// ── RENDER BOOKINGS ──────────────────────────────
function renderBookings(bookings){
  const body = document.getElementById('tableBody');
  if(!bookings||!bookings.length){body.innerHTML='<div class="empty">No bookings yet.</div>';return;}
  body.innerHTML='<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Name</th>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Phone</th>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Type</th>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Date</th>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Pickup → Drop</th>'
    +'<th style="text-align:left;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Status</th>'
    +'<th style="text-align:center;padding:8px;font-size:11px;color:var(--muted);border-bottom:1px solid var(--border)">Actions</th>'
    +'</tr></thead><tbody>'
    +bookings.map(function(b,i){
      const status = b.status || 'Pending';
      const statusColor = status==='Confirmed' ? '#5de8a0' : status==='Rejected' ? '#ff8080' : status==='Negotiating' ? '#C7A007' : status==='Lost' ? '#888' : '#C7A007';
      const statusBg = status==='Confirmed' ? 'rgba(10,92,54,0.2)' : status==='Rejected' ? 'rgba(200,50,50,0.15)' : status==='Negotiating' ? 'rgba(199,160,7,0.15)' : status==='Lost' ? 'rgba(100,100,100,0.15)' : 'rgba(199,160,7,0.15)';
      return '<tr>'
        +'<td style="padding:8px;font-size:12px;border-bottom:1px solid var(--border);font-weight:600">'+(b.name||'')+'</td>'
        +'<td style="padding:8px;font-size:12px;border-bottom:1px solid var(--border)"><a href="tel:'+b.phone+'" style="color:var(--gold)">'+(b.phone||'')+'</a></td>'
        +'<td style="padding:8px;font-size:12px;border-bottom:1px solid var(--border)">'+(b.tripType||'')+'</td>'
        +'<td style="padding:8px;font-size:12px;border-bottom:1px solid var(--border);color:var(--muted)">'+(b.date||'').toString().split('T')[0]+'</td>'
        +'<td style="padding:8px;font-size:12px;border-bottom:1px solid var(--border)">'+(b.pickup||'')+' → '+(b.drop||'')+'</td>'
        +'<td style="padding:8px;border-bottom:1px solid var(--border)">'
        +'<span style="padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;background:'+statusBg+';color:'+statusColor+'">'+status+'</span>'
        +'</td>'
        +'<td style="padding:8px;border-bottom:1px solid var(--border);white-space:nowrap;text-align:center">'
        +(status!=='Confirmed'?'<button data-idx="'+i+'" data-status="Confirmed" onclick="updateBookingStatus(this)" style="padding:3px 8px;background:rgba(10,92,54,0.2);color:#5de8a0;border:1px solid rgba(10,92,54,0.4);border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;margin:1px">✓ Confirm</button>':'')
        +(status!=='Negotiating'?'<button data-idx="'+i+'" data-status="Negotiating" onclick="updateBookingStatus(this)" style="padding:3px 8px;background:rgba(199,160,7,0.15);color:#C7A007;border:1px solid rgba(199,160,7,0.3);border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;margin:1px">₹ Negotiate</button>':'')
        +(status!=='Rejected'?'<button data-idx="'+i+'" data-status="Rejected" onclick="updateBookingStatus(this)" style="padding:3px 8px;background:rgba(200,50,50,0.1);color:#ff8080;border:1px solid rgba(200,50,50,0.3);border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;margin:1px">✗ Reject</button>':'')
        +(status!=='Lost'?'<button data-idx="'+i+'" data-status="Lost" onclick="updateBookingStatus(this)" style="padding:3px 8px;background:rgba(100,100,100,0.1);color:#888;border:1px solid rgba(100,100,100,0.2);border-radius:5px;font-size:10px;cursor:pointer;font-family:inherit;margin:1px">Lost</button>':'')
        +'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table>';
}

function updateBookingStatus(btn){
  const idx = parseInt(btn.getAttribute('data-idx'));
  const status = btn.getAttribute('data-status');
  const booking = (allData.bookings||[])[idx];
  if(!booking) return;
  
  const note = status==='Negotiating' ? prompt('Enter negotiation note (e.g. "Offered Rs.2500"):','') : null;
  
  fetch(SCRIPT_URL, {
    method:'POST',
    body: JSON.stringify({
      action: 'updateBookingStatus',
      name: booking.name,
      phone: booking.phone,
      date: booking.date,
      status: status,
      note: note || ''
    })
  })
  .then(r=>r.json())
  .then(res=>{
    if(res.success){
      // Update local data
      (allData.bookings||[])[idx].status = status;
      if(note) (allData.bookings||[])[idx].note = note;
      renderBookings(allData.bookings||[]);
      // Send Telegram notification
      if(status==='Confirmed') alert('Booking confirmed! Telegram notification sent.');
      else if(status==='Negotiating') alert('Marked as negotiating.');
    } else {
      alert('Error: '+(res.error||'Unknown'));
    }
  })
  .catch(()=>{
    // Update locally even if fetch fails
    (allData.bookings||[])[idx].status = status;
    renderBookings(allData.bookings||[]);
  });
}


function fetchInvoice(btn){
  var tripNo = btn.dataset.trip;
  var customer = btn.dataset.cust;
  fetch(SCRIPT_URL + '?action=getInvoiceUrl&tripNo=' + encodeURIComponent(tripNo) + '&customer=' + encodeURIComponent(customer))
  .then(r=>r.json())
  .then(res=>{ if(res.url) window.open(res.url,'_blank'); else alert('Invoice not found in Drive.'); })
  .catch(()=>alert('Could not connect.'));
}

// ── TAB SWITCHING ────────────────────────────────
function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.getAttribute('onclick') && t.getAttribute('onclick').includes("'"+tab+"'");
    t.classList.toggle('active', isActive);
  });
  if(tab==='trips')    renderTrips(allData.trips||[]);
  else if(tab==='bookings') renderBookings(allData.bookings||[]);
  else if(tab==='drivers')  renderDrivers(allData.drivers||[]);
  else if(tab==='vehicles') renderVehicles(allData.vehicles||[]);
}

function adminApproveDriver(btn){
  var name = btn.getAttribute('data-name');
  var phone = btn.getAttribute('data-phone');
  var status = btn.getAttribute('data-action');
  if(!confirm(status + ' driver ' + name + '?')) return;
  fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'approveDriver', name:name, phone:phone, status:status})})
  .then(r=>r.json()).then(res=>{
    if(res.success){ alert('Driver ' + status + '!'); loadDashboard(); }
    else alert('Error: ' + (res.error||'Unknown'));
  }).catch(()=>alert('Network error'));
}

function adminApproveVehicle(btn){
  var regNo = btn.getAttribute('data-regno');
  var status = btn.getAttribute('data-action');
  if(!confirm(status + ' vehicle ' + regNo + '?')) return;
  fetch(SCRIPT_URL, {method:'POST', body: JSON.stringify({action:'approveVehicle', regNo:regNo, status:status})})
  .then(r=>r.json()).then(res=>{
    if(res.success){ alert('Vehicle ' + status + '!'); loadDashboard(); }
    else alert('Error: ' + (res.error||'Unknown'));
  }).catch(()=>alert('Network error'));
}
function loadDashboard(){
  document.getElementById('lastUpdated').textContent = 'Loading data...';
  document.getElementById('tableBody').innerHTML = '<div class="loading">Loading trips...</div>';

  // Use script tag injection to bypass CORS — most reliable from GitHub Pages
  const cbName = 'hrcDashCb_' + Date.now();
  const script = document.createElement('script');

  window[cbName] = function(data) {
    delete window[cbName];
    script.remove();
    if(data.error){
      document.getElementById('lastUpdated').textContent = 'Error: ' + data.error;
      document.getElementById('tableBody').innerHTML = '<div class="empty" style="color:#ff8080">⚠️ ' + data.error + '</div>';
      return;
    }
    allData = data;
    renderStats(data);
    renderChart(data.last7days || []);
    renderTrips(data.trips || []);
    document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-IN');
  };

  script.onerror = function(){
    delete window[cbName];
    script.remove();
    // Fallback to plain fetch
    fetch(SCRIPT_URL + '?action=getDashboard')
      .then(r => r.json())
      .then(data => {
        allData = data;
        renderStats(data);
        renderChart(data.last7days || []);
        renderTrips(data.trips || []);
        document.getElementById('lastUpdated').textContent = 'Last updated: ' + new Date().toLocaleTimeString('en-IN');
      })
      .catch(err => {
        document.getElementById('lastUpdated').textContent = 'Failed: ' + err.message;
        document.getElementById('tableBody').innerHTML = '<div class="empty" style="color:#ff8080">⚠️ Could not load data. Check console.</div>';
      });
  };

  script.src = SCRIPT_URL + '?action=getDashboard&callback=' + cbName;
  document.head.appendChild(script);
  setTimeout(() => { if(window[cbName]) script.onerror(); }, 8000);
}


function applyFilter(){
  const q    = document.getElementById('searchBox').value.toLowerCase();
  const from = document.getElementById('filterFrom').value;
  const to   = document.getElementById('filterTo').value;

  let data = currentTab==='trips' ? (allData.trips||[]) : (allData.bookings||[]);

  // Date filter
  if(from || to){
    data = data.filter(r=>{
      const d = r.date || '';
      // Convert dd/MM/yyyy to yyyy-MM-dd for comparison
      const parts = d.split('/');
      if(parts.length===3){
        const iso = parts[2]+'-'+parts[1]+'-'+parts[0];
        if(from && iso < from) return false;
        if(to   && iso > to)   return false;
      }
      return true;
    });
  }

  // Text search
  if(q) data = data.filter(r=>JSON.stringify(r).toLowerCase().includes(q));

  if(currentTab==='trips') renderTrips(data);
  else renderBookings(data);
}

function setQuick(range){
  document.querySelectorAll('.qbtn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');

  const now   = new Date();
  const today = now.toISOString().split('T')[0];
  let from='', to=today;

  if(range==='today'){
    from = today;
  } else if(range==='week'){
    const d = new Date(now);
    d.setDate(d.getDate() - d.getDay());
    from = d.toISOString().split('T')[0];
  } else if(range==='month'){
    from = today.substring(0,7) + '-01';
  } else {
    from=''; to='';
  }

  document.getElementById('filterFrom').value = from;
  document.getElementById('filterTo').value   = to;
  applyFilter();
}

function exportCSV(){
  const data = currentTab==='trips' ? (allData.trips||[]) : (allData.bookings||[]);
  if(!data.length){alert('No data to export.');return;}
  let csv = '';
  const NL = '\n';
  if(currentTab==='trips'){
    csv = 'Trip No,Customer,Type,Date,Total' + NL +
      data.map(t=>'"'+(t.tripNo||'')+'",'
        +'"'+(t.customer||'')+'",'
        +'"'+(t.type||'')+'",'
        +'"'+(t.date||'')+'",'
        +'"'+((t.total||0).toFixed(2))+'"'
      ).join(NL);
  } else {
    csv = 'Name,Phone,Trip Type,Date,Pickup,Drop' + NL +
      data.map(b=>'"'+(b.name||'')+'",'
        +'"'+(b.phone||'')+'",'
        +'"'+(b.tripType||'')+'",'
        +'"'+(b.date||'')+'",'
        +'"'+(b.pickup||'')+'",'
        +'"'+(b.drop||'')+'"'
      ).join(NL);
  }
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'hrcabs_' + currentTab + '_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}
